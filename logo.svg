<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="PMU MIS Club">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5f"/>
      <stop offset="100%" stop-color="#0a1d39"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#lg-bg)"/>
  <!-- Subtle inner border -->
  <rect x="3" y="3" width="94" height="94" rx="15" fill="none" stroke="#2a3548" stroke-width="1"/>
  <!-- Corner circuit ticks -->
  <g fill="#5eead4" opacity="0.55">
    <rect x="12" y="12" width="6" height="1"/>
    <rect x="12" y="12" width="1" height="6"/>
    <rect x="82" y="12" width="6" height="1"/>
    <rect x="87" y="12" width="1" height="6"/>
    <rect x="12" y="87" width="6" height="1"/>
    <rect x="12" y="82" width="1" height="6"/>
    <rect x="82" y="87" width="6" height="1"/>
    <rect x="87" y="82" width="1" height="6"/>
  </g>
  <!-- Central mark: stacked MIS -->
  <text x="50" y="46" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="18" fill="#ffffff" letter-spacing="1">PMU</text>
  <text x="50" y="65" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="18" fill="#5eead4" letter-spacing="1">MIS</text>
  <line x1="32" y1="73" x2="68" y2="73" stroke="#d4a017" stroke-width="1.2"/>
  <text x="50" y="85" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="500" font-size="8" fill="#d4a017" letter-spacing="3">CLUB</text>
</svg>
